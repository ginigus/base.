<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления БД</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">База Данных Магазина</a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <span class="nav-link text-white">Привет, {{ user.username }}</span>
                    <a class="btn btn-outline-danger btn-sm ms-2" href="{% url 'logout' %}">Выйти</a>
                {% else %}
                    <a class="btn btn-outline-primary btn-sm me-2" href="{% url 'login' %}">Войти</a>
                    <a class="btn btn-primary btn-sm" href="{% url 'register' %}">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
