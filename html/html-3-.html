{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Панель управления данными</h2>
</div>

<ul class="nav nav-tabs mb-3" id="dbTabs" role="tablist">
  <li class="nav-item">
    <button class="nav-link active" id="products-tab" data-bs-toggle="tab" data-bs-target="#products" type="button">Товары</button>
  </li>
  <li class="nav-item">
    <button class="nav-link" id="customers-tab" data-bs-toggle="tab" data-bs-target="#customers" type="button">Клиенты</button>
  </li>
</ul>

<div class="tab-content" id="dbTabsContent">
  <div class="tab-pane fade show active" id="products">
    <div class="card shadow-sm p-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Список товаров</h4>
            <a href="{% url 'add_product' %}" class="btn btn-primary btn-sm">+ Добавить товар</a>
        </div>
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Категория</th>
                    <th>Цена</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {% for p in products %}
                <tr>
                    <td>{{ p.id }}</td>
                    <td>{{ p.title }}</td>
                    <td>{{ p.category }}</td>
                    <td>{{ p.price }} руб.</td>
                    <td>
                        <a href="{% url 'edit_product' p.pk %}" class="btn btn-warning btn-sm">Редактировать</a>
                        <a href="{% url 'delete_product' p.pk %}" class="btn btn-danger btn-sm">Удалить</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
  </div>

  <div class="tab-pane fade" id="customers">
     </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
