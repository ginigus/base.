{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">Подтвердите удаление</h5>
            </div>
            <div class="card-body text-center">
                <p class="fs-5">Вы уверены, что хотите безвозвратно удалить товар <strong>"{{ object.title }}"</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary me-2">Отмена</a>
                    <button type="submit" class="btn btn-danger">Да, удалить</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
